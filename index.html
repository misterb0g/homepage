<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Start Desk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/assistant-enhancements.css" />
  <link rel="stylesheet" href="css/startpage-plus.css" />
  <link rel="stylesheet" href="css/start-desk.css" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8f9fa" media="(prefers-color-scheme: light)">

  <script>
    (function () {
      try {
        var root = document.documentElement;
        var pref = localStorage.getItem('theme') || 'system';
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        var effective;

        if (pref === 'system') {
          effective = mq.matches ? 'dark' : 'light';
        } else if (pref === 'mac') {
          effective = mq.matches ? 'macos-dark' : 'macos-light';
        } else {
          effective = pref;
        }

        root.setAttribute('data-theme', effective);
        root.setAttribute('data-theme-pref', pref);
      } catch (e) {}
    })();
  </script>

  <script>
    /* Préférences par défaut de la version Focus clean.
       Migration appliquée une fois pour faire du Focus le mode d'accueil par défaut,
       sans empêcher de revenir ensuite au mode complet via le bouton Focus. */
    (function () {
      try {
        var migrationKey = 'startpage_focus_clean_default_v2';
        if (localStorage.getItem(migrationKey) !== '1') {
          localStorage.setItem('startpage_focus_mode_v1', '1');
          localStorage.setItem('startpage_auto_context_v1', '0');
          localStorage.setItem('startpage_profile_v2', 'silex');
          localStorage.setItem('density', 'cozy');
          localStorage.setItem('startpage_density_v2', 'cozy');
          localStorage.setItem(migrationKey, '1');
        }
        document.documentElement.classList.add('focus-default');
      } catch (e) {}
    })();
  </script>

  <script>
    /* Start Desk v1 : nouveau comportement d’accueil.
       Appliqué une seule fois pour installer le mode Focus/Silex par défaut. */
    (function () {
      try {
        var key = 'startdesk_v1_defaults_applied';
        if (localStorage.getItem(key) !== '1') {
          localStorage.setItem('startpage_focus_mode_v1', '1');
          localStorage.setItem('startpage_profile_v2', 'silex');
          localStorage.setItem('showChat', 'false');
          localStorage.setItem('showNews', 'false');
          localStorage.setItem('startpage_auto_context_v1', '0');
          localStorage.setItem('density', 'cozy');
          localStorage.setItem('startpage_density_v2', 'cozy');
          localStorage.setItem(key, '1');
        }
        document.documentElement.classList.add('start-desk');
      } catch (e) {}
    })();
  </script>

  <script>
    /* Start Desk v3.1b : correctif.
       Force une seule fois le retour au mode Focus/Silex par défaut,
       même si une ancienne préférence locale avait remis le mode complet. */
    (function () {
      try {
        var key = 'startdesk_v31b_focus_default_fix';
        if (localStorage.getItem(key) !== '1') {
          localStorage.setItem('startpage_focus_mode_v1', '1');
          localStorage.setItem('startpage_profile_v2', 'silex');
          localStorage.setItem('startpage_auto_context_v1', '0');
          localStorage.setItem(key, '1');
        }
      } catch (e) {}
    })();
  </script>


  <style>
    /* --- Animations globales --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px) scale(.985); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    
    .bookmark-set, #news-container {
      opacity: 0; 
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      will-change: transform, opacity, filter;
    }
    #news-container { animation-delay: 0.1s; }

    #weather-details:not([hidden]) {
      animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* --- Gestion de l'affichage News --- */
    /* Permet de masquer tout le bloc news via le panneau de contrôle */
    body.news-hidden #news-container {
        display: none !important;
    }

    /* Grille pour les 2 colonnes de news */
    .news-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 colonnes égales */
        gap: 2rem;
    }

    /* Responsive : 1 seule colonne sur mobile */
    @media (max-width: 768px) {
        .news-grid {
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
    }
  
    /* --- Spotlight modal : garantir que le menu des moteurs passe AU-DESSUS de l’overlay --- */
    @supports(selector(:has(*))) {
      body:has(.spotlight:focus-within) .engine-menu { z-index: 906; }
    }


    /* --- Panneau Paramètres : intégration macOS / glassmorphism --- */
    #control-panel.glass {
      top: 14px;
      right: 14px;
      height: calc(100dvh - 28px);
      width: min(370px, calc(100vw - 28px));
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.50), rgba(255, 255, 255, 0.24)),
        rgba(245, 247, 250, 0.58);
      -webkit-backdrop-filter: saturate(180%) blur(30px);
      backdrop-filter: saturate(180%) blur(30px);
      box-shadow:
        0 28px 80px rgba(15, 23, 42, 0.20),
        0 8px 24px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      opacity: 0;
      transform: translateX(calc(100% + 28px)) scale(0.985);
      transition:
        transform 0.34s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.22s ease;
    }

    body.panel-open #control-panel.glass {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    #overlay {
      background: rgba(10, 20, 30, 0.08);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    body.panel-open #overlay {
      opacity: 1;
    }

    .panel-header {
      min-height: 60px;
      padding: 1rem 1rem 0.85rem;
      margin-bottom: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.28);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.10));
    }

    .panel-header h3 {
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: -0.025em;
    }

    .panel-content {
      height: calc(100% - 61px);
      padding: 0.95rem;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .panel-section {
      margin-bottom: 0.78rem;
      padding: 0.88rem 0.9rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .panel-section > label {
      margin-bottom: 0.62rem;
      font-size: 0.82rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }

    #control-panel .segmented-control,
    #control-panel .input-group,
    #control-panel .toggle-switch {
      position: relative;
      z-index: 1;
    }

    #control-panel .btn-icon {
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    #control-panel .btn-icon:hover {
      background: rgba(255, 255, 255, 0.40);
      transform: translateY(-1px);
    }

    :root[data-theme="dark"] #control-panel.glass,
    :root[data-theme="macos-dark"] #control-panel.glass {
      border-color: rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(56, 64, 82, 0.56), rgba(23, 27, 36, 0.38)),
        rgba(18, 22, 30, 0.58);
      box-shadow:
        0 32px 90px rgba(0, 0, 0, 0.46),
        0 10px 28px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    :root[data-theme="dark"] .panel-header,
    :root[data-theme="macos-dark"] .panel-header {
      border-bottom-color: rgba(255, 255, 255, 0.10);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
    }

    :root[data-theme="dark"] .panel-section,
    :root[data-theme="macos-dark"] .panel-section {
      border-color: rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.075);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    :root[data-theme="dark"] #control-panel .btn-icon,
    :root[data-theme="macos-dark"] #control-panel .btn-icon {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.10);
    }

    :root[data-theme="dark"] #control-panel .btn-icon:hover,
    :root[data-theme="macos-dark"] #control-panel .btn-icon:hover {
      background: rgba(255, 255, 255, 0.14);
    }


    /* --- Mode automatique Matin / Journée / Soir --- */
    .startpage-auto-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .38rem;
      min-height: 34px;
      padding: .42rem .78rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.22);
      color: inherit;
      font: inherit;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 6px 18px rgba(15, 23, 42, 0.06);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, opacity .18s ease;
    }

    .startpage-auto-pill:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.34);
    }

    .startpage-auto-pill.active::before {
      content: '';
      width: .48rem;
      height: .48rem;
      border-radius: 999px;
      background: currentColor;
      opacity: .64;
    }

    .startpage-auto-pill:not(.active) {
      opacity: .82;
      background: rgba(255, 255, 255, 0.14);
      border-style: dashed;
    }

    .startpage-auto-pill:not(.active)::before {
      content: '';
      width: .48rem;
      height: .48rem;
      border-radius: 999px;
      border: 1.5px solid currentColor;
      opacity: .45;
    }

    .startpage-auto-pill.active {
      background: rgba(255, 255, 255, 0.30);
      border-style: solid;
    }

    :root[data-theme="dark"] .startpage-auto-pill,
    :root[data-theme="macos-dark"] .startpage-auto-pill {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    :root[data-theme="dark"] .startpage-auto-pill:hover,
    :root[data-theme="macos-dark"] .startpage-auto-pill:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    /* --- Micro-polish macOS : contrôles rapides --- */
    .startpage-quick-controls {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .42rem;
      margin: .62rem auto 0;
      padding: .34rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24), 0 10px 28px rgba(15, 23, 42, 0.055);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      backdrop-filter: blur(22px) saturate(170%);
    }

    .startpage-quick-controls > button {
      min-height: 32px;
      box-shadow: none;
      border-color: transparent;
    }

    .startpage-profile-pill,
    .startpage-focus-pill,
    .startpage-auto-pill {
      position: relative;
    }

    .startpage-profile-pill:hover,
    .startpage-focus-pill:hover,
    .startpage-auto-pill:hover {
      background: rgba(255, 255, 255, 0.36);
    }

    .startpage-profile-pill:focus-visible,
    .startpage-focus-pill:focus-visible,
    .startpage-auto-pill:focus-visible {
      outline: 2px solid rgba(0, 122, 255, 0.55);
      outline-offset: 3px;
    }

    .startpage-auto-pill:not(.active) {
      border-style: solid;
      opacity: .78;
    }

    .startpage-auto-pill:not(.active)::after {
      content: 'manuel';
      margin-left: .12rem;
      padding: .08rem .34rem;
      border-radius: 999px;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .01em;
      background: rgba(255, 255, 255, 0.34);
      opacity: .78;
    }

    :root[data-theme="dark"] .startpage-quick-controls,
    :root[data-theme="macos-dark"] .startpage-quick-controls {
      border-color: rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    :root[data-theme="dark"] .startpage-profile-pill:hover,
    :root[data-theme="dark"] .startpage-focus-pill:hover,
    :root[data-theme="dark"] .startpage-auto-pill:hover,
    :root[data-theme="macos-dark"] .startpage-profile-pill:hover,
    :root[data-theme="macos-dark"] .startpage-focus-pill:hover,
    :root[data-theme="macos-dark"] .startpage-auto-pill:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    :root[data-theme="dark"] .startpage-auto-pill:not(.active)::after,
    :root[data-theme="macos-dark"] .startpage-auto-pill:not(.active)::after {
      background: rgba(255, 255, 255, 0.10);
    }

    @media (max-width: 767px) {
      #control-panel.glass {
        top: auto;
        right: 10px;
        left: 10px;
        bottom: 10px;
        width: auto;
        height: min(82dvh, 680px);
        border-radius: 26px;
        transform: translateY(calc(100% + 24px)) scale(0.985);
      }

      body.panel-open #control-panel.glass {
        transform: translateY(0) scale(1);
      }
    }


    /* --- Page allégée par défaut + inspiration macOS 27 --- */
    :root {
      --liquid-edge: rgba(255, 255, 255, 0.42);
      --liquid-fill: rgba(255, 255, 255, 0.20);
      --liquid-fill-strong: rgba(255, 255, 255, 0.32);
      --liquid-shadow: 0 18px 70px rgba(15, 23, 42, 0.13), inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    :root[data-theme="dark"],
    :root[data-theme="macos-dark"] {
      --liquid-edge: rgba(255, 255, 255, 0.14);
      --liquid-fill: rgba(255, 255, 255, 0.075);
      --liquid-fill-strong: rgba(255, 255, 255, 0.12);
      --liquid-shadow: 0 22px 80px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    body.focus-mode #greeting-container,
    body.focus-mode #weather,
    body.focus-mode #news-container,
    body.focus-mode #chat-container,
    body.focus-mode #calendar-widget,
    body.focus-mode #weather-details {
      display: none !important;
    }


    /* En mode Focus, on garde uniquement les Favoris comme contenu principal. */
    body.focus-mode #bookmark-container {
      display: grid !important;
      width: min(960px, 92vw);
      margin: 1.15rem auto 0;
      gap: .85rem;
    }

    body.focus-mode #bookmark-container .bookmark-set {
      background:
        linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.075)),
        var(--liquid-fill);
      border-color: var(--liquid-edge);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      backdrop-filter: blur(24px) saturate(170%);
      box-shadow: 0 12px 44px rgba(15, 23, 42, .08), inset 0 1px 0 rgba(255,255,255,.22);
    }

    body.focus-mode #bookmark-container .bookmark-header {
      opacity: .82;
    }

    body.focus-mode #bookmark-container .bookmark {
      min-height: 32px;
    }

    body.focus-mode .container {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 8dvh;
      padding-bottom: 12dvh;
    }

    body.focus-mode #search-form.spotlight {
      width: min(760px, 92vw);
      min-height: 64px;
      border-radius: 28px;
      border-color: var(--liquid-edge);
      background:
        linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.12)),
        var(--liquid-fill);
      -webkit-backdrop-filter: blur(32px) saturate(185%);
      backdrop-filter: blur(32px) saturate(185%);
      box-shadow: var(--liquid-shadow);
    }

    body.focus-mode #search-input {
      font-size: 1.04rem;
      letter-spacing: -0.018em;
    }

    body.focus-mode .quick-command-hint {
      display: none;
    }

    body.focus-mode .startpage-quick-controls {
      margin-top: .72rem;
      background:
        linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.08)),
        var(--liquid-fill);
      border-color: var(--liquid-edge);
      box-shadow: var(--liquid-shadow);
      -webkit-backdrop-filter: blur(28px) saturate(185%);
      backdrop-filter: blur(28px) saturate(185%);
    }

    body.focus-mode .startpage-quick-controls > button {
      min-height: 34px;
      padding-inline: .86rem;
      border-radius: 999px;
      background: transparent;
    }

    body.focus-mode .startpage-quick-controls > button.active,
    body.focus-mode .startpage-focus-pill.active {
      background: var(--liquid-fill-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 6px 18px rgba(15,23,42,.06);
    }

    @media (max-width: 720px) {

    body.focus-mode #bookmark-container {
      display: grid !important;
      width: min(960px, 92vw);

    }

    }

    body.focus-mode #bookmark-container .bookmark-header {

    body.focus-mode #bookmark-container .bookmark {

        justify-content: flex-start;

      }

      body.focus-mode .startpage-quick-controls {
        max-width: 92vw;
        overflow-x: auto;
        justify-content: flex-start;
      }
    }


    /* Focus clean : favoris centrés en permanence.
       Flex-wrap permet à la dernière ligne incomplète de rester centrée,
       contrairement à une grille fixe 4/3/2 colonnes. */
    body.focus-mode #bookmark-container {
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      align-items: flex-start !important;
      align-content: flex-start !important;
      width: min(1180px, calc(100vw - 56px)) !important;
      max-width: 1180px !important;
      margin: clamp(1rem, 2.4vh, 1.65rem) auto 0 !important;
      gap: clamp(.85rem, 1.2vw, 1.05rem) !important;
      box-sizing: border-box !important;
    }

    body.focus-mode #bookmark-container .bookmark-set {
      flex: 0 1 clamp(245px, 22vw, 280px) !important;
      width: clamp(245px, 22vw, 280px) !important;
      max-width: 280px !important;
      min-width: 0 !important;
      box-sizing: border-box !important;
      position: relative !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    body.focus-mode #bookmark-container .bookmark-inner-container,
    body.focus-mode #bookmark-container .bookmark-header,
    body.focus-mode #bookmark-container .bookmark {
      min-width: 0 !important;
      box-sizing: border-box !important;
    }

    @media (max-width: 760px) {
      body.focus-mode #bookmark-container {
        width: min(620px, calc(100vw - 32px)) !important;
      }
      body.focus-mode #bookmark-container .bookmark-set {
        flex-basis: min(280px, calc(50vw - 24px)) !important;
        width: min(280px, calc(50vw - 24px)) !important;
      }
    }

    @media (max-width: 560px) {
      body.focus-mode #bookmark-container {
        width: min(420px, calc(100vw - 28px)) !important;
      }
      body.focus-mode #bookmark-container .bookmark-set {
        flex-basis: 100% !important;
        width: 100% !important;
        max-width: 420px !important;
      }
    }


    /* --- Mode complet : Favoris au même look macOS 27 que le mode Focus --- */
    body:not(.focus-mode) #bookmark-container {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      width: min(1280px, calc(100vw - 56px)) !important;
      max-width: 1280px !important;
      margin: clamp(1.4rem, 3.2vh, 2.4rem) auto 0 !important;
      gap: clamp(.9rem, 1.35vw, 1.15rem) !important;
      align-items: start !important;
      justify-items: stretch !important;
      box-sizing: border-box !important;
    }

    body:not(.focus-mode) #bookmark-container .bookmark-set {
      width: 100% !important;
      max-width: none !important;
      min-width: 0 !important;
      margin: 0 !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
      position: relative !important;
      border-radius: 24px !important;
      border-color: var(--liquid-edge) !important;
      background:
        linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.075)),
        var(--liquid-fill) !important;
